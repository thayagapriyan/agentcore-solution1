name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: id-token to assume the deploy role, no long-lived keys.
permissions:
  id-token: write
  contents: read

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # Single build of the ARM64 image, pushed straight to ECR before any
      # terraform apply — so the image the runtime points at always exists first.
      - name: Build & push (ARM64)
        env:
          ECR_URI: ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # Deployed-state check: invoke the live runtime and require a result field.
      - name: Smoke test
        working-directory: infra
        run: |
          ARN=$(terraform output -raw agent_runtime_arn)
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"ping"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke.json
          cat smoke.json
          grep -q result smoke.json
